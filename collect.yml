name: Collect SMHI Weather Data

on:
  # Run every hour
  schedule:
    - cron: "0 * * * *"

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      mode:
        description: "Collection mode"
        required: false
        default: "collect"
        type: choice
        options:
          - collect
          - backfill
          - export-only

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit weather_data.json back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Fetch full history so the DB commit doesn't conflict
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests

      # Restore the SQLite database from the previous run.
      # GitHub Actions runners are ephemeral — the DB would be empty
      # on every run without this cache step.
      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: varberg_weather.db
          # Key rotates weekly so the cache doesn't grow forever
          key: smhi-db-${{ github.run_id }}
          restore-keys: |
            smhi-db-

      - name: Run collector
        run: |
          MODE="${{ github.event.inputs.mode || 'collect' }}"
          if [ "$MODE" = "collect" ]; then
            python collect_smhi.py
          elif [ "$MODE" = "backfill" ]; then
            python collect_smhi.py --backfill
          else
            python collect_smhi.py --export
          fi

      - name: Show summary
        run: python query_db.py check

      # Commit the updated weather_data.json back to the repo.
      # The HTML report reads this file directly — no build step needed.
      - name: Commit weather_data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add weather_data.json
          # Only commit if the file actually changed
          git diff --cached --quiet || \
            git commit -m "chore: update weather data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
