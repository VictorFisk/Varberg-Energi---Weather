name: Weekly Weather Email

on:
  # Every Monday at 06:30 Swedish time (05:30 UTC winter, 04:30 UTC summer)
  schedule:
    - cron: "30 5 * * 1"

  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      recipient:
        description: "Override recipient email (leave empty for default)"
        required: false
        default: ""

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.5.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests

      # Restore the database so we have history for the comparison
      - name: Restore database cache
        uses: actions/cache@v4.2.0
        with:
          path: varberg_weather.db
          key: smhi-db-${{ github.run_id }}
          restore-keys: |
            smhi-db-

      # Run collector first to make sure data is fresh
      - name: Refresh weather data
        run: python collect_smhi.py

      # Build and send the email
      - name: Send weekly report email
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          RECIPIENT:      ${{ secrets.RECIPIENT_EMAIL }}
          OVERRIDE_TO:    ${{ github.event.inputs.recipient }}
          PAGES_URL:      ${{ secrets.PAGES_URL }}
        run: python send_weekly_email.py
