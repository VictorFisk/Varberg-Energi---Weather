name: Deploy Report to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "weather_data.json"
      - "rapport.html"
      - "data.html"
      - "index.html"
      - "varberg_weather.db"
      - "daily_archive.json"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Pages
        uses: actions/configure-pages@v5.0.0

      - name: Upload site
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
